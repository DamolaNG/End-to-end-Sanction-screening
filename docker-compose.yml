services:
  postgres:
    image: postgres:16
    container_name: sanctionsight-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sanctionsight}
      POSTGRES_USER: ${POSTGRES_USER:-sanctionsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sanctionsight}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sanctionsight} -d ${POSTGRES_DB:-sanctionsight}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: poetry run uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sanctionsight}:${POSTGRES_PASSWORD:-sanctionsight}@postgres:5432/${POSTGRES_DB:-sanctionsight}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    profiles: ["app"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: poetry run streamlit run dashboards/streamlit_app/main.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sanctionsight}:${POSTGRES_PASSWORD:-sanctionsight}@postgres:5432/${POSTGRES_DB:-sanctionsight}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    profiles: ["app"]

volumes:
  postgres_data:
